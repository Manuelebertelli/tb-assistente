<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TB Assistente v3.2 Cloud</title>

<style>
:root{
--bg:#050506;
--card:#151517;
--line:#ffffff18;
--txt:#f5f5f7;
--mut:#9b9ba2;
--g:#30d158;
--r:#ff453a;
--o:#ff9f0a;

}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:radial-gradient(circle at top right,#202a3a,#050506 42%);
color:var(--txt);
font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
padding-bottom:74px;
}

button,input,select,textarea{
font:inherit;
}

button{
border:0;
border-radius:16px;
padding:12px 14px;
min-height:44px;
font-weight:800;
background:#f5f5f7;
color:#050506;
cursor:pointer;
}

button.secondary{
background:#252529;
color:#fff;
border:1px solid var(--line);
}

input,select,textarea{
width:100%;
background:#101012;
color:#fff;
border:1px solid var(--line);
border-radius:16px;
padding:12px;
min-height:44px;
}

label{
display:block;
margin:12px 0 6px;
color:var(--mut);
font-size:12px;
font-weight:700;
}

header{
position:sticky;
top:0;
z-index:30;
background:#050506cc;
backdrop-filter:blur(22px);
border-bottom:1px solid var(--line);

.top{
display:flex;

.grow{

}

.title{

}

.sub{

}

main{
padding:14px;
max-width:850px;
margin:auto;
}

.card{
background:linear-gradient(180deg,#18181b,#111113);
border:1px solid var(--line);
border-radius:24px;
padding:16px;
margin-bottom:14px;
box-shadow:0 20px 60px #0008;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btnrow{
display:flex;
gap:9px;
flex-wrap:wrap;
}

.btnrow>*{
flex:1;
}

.companyItem{
display:grid;
grid-template-columns:34px 1fr auto;
gap:10px;
align-items:center;
background:#111113;
border:1px solid var(--line);
border-radius:20px;
padding:12px;
margin-bottom:9px;
}

.starbtn{
width:34px;
height:34px;
padding:0;
border-radius:12px;
background:#242428;
color:#666;
}

.starbtn.on{
color:var(--y);
background:#3a3109;
}

.status{
border-radius:18px;
padding:12px;
border:1px solid var(--line);
background:#111113;
}

.status.ok{
background:#0d2515;
border-color:#30d15855;
color:#c7ffd5;
}

.status.bad{
background:#2a1110;
border-color:#ff453a55;
color:#ffd1cf;
}
</style>
</head>

<body>

<header>
<div class="top">
<div class="grow">
<div class="title">TB Assistente v3.2 ☁️</div>
<div class="sub">Firebase Cloud Save attivo</div>
</div>
</div>
</header>

<main>

<div class="card">
<h2>☁️ Cloud Sync</h2>

<div class="btnrow">
<button onclick="saveCloud(state)">
☁️ Salva Online
</button>

<button class="secondary" onclick="loadCloudData()">
☁️ Carica Online
</button>
</div>

<div id="cloudStatus" class="status" style="margin-top:12px">
Firebase pronto...
</div>
</div>

<div class="card">
<h2>🏢 Anagrafica aziende</h2>

<div class="row">
<div>
<label>Ticker</label>
<input id="cTicker" placeholder="NVDA">
</div>

<div>
<label>Mercato</label>
<input id="cMarket" placeholder="USA">
</div>
</div>

<label>Nome azienda</label>
<input id="cName" placeholder="NVIDIA Corp">

<div class="row">
<div>
<label>Settore</label>
<input id="cSector" placeholder="AI / Semiconduttori">
</div>

<div>
<label>Preferito</label>
<select id="cFav">
<option value="true">Sì ⭐</option>
<option value="false">No</option>
</select>
</div>
</div>

<label>Note</label>
<input id="cNotes" placeholder="Perché la monitoro?">

<div class="btnrow" style="margin-top:12px">
<button onclick="addCompany()">
Aggiungi / aggiorna
</button>

<button class="secondary" onclick="seed()">
Default
</button>
</div>
</div>

<div class="card">
<h2>📋 Lista aziende</h2>
<div id="companyList"></div>
</div>

</main>

<script>

const $ = id => document.getElementById(id);

let state = {
companies: []
};

function saveLocal(){
localStorage.setItem('tb_assistente_state', JSON.stringify(state));
}

function loadLocal(){
try{
const s = localStorage.getItem('tb_assistente_state');
if(s){
state = JSON.parse(s);
}
}catch(e){
console.error(e);
}
}

function seed(){
state.companies = [
{ticker:'NVDA',name:'NVIDIA',market:'USA',sector:'AI',favorite:true},
{ticker:'PLTR',name:'Palantir',market:'USA',sector:'Software',favorite:true},
{ticker:'TSLA',name:'Tesla',market:'USA',sector:'EV',favorite:true},
{ticker:'META',name:'Meta',market:'USA',sector:'Big Tech',favorite:false}
];

saveLocal();
render();
}

function addCompany(){

const ticker = $('cTicker').value.trim().toUpperCase();

if(!ticker){
alert('Ticker mancante');
return;
}

const company = {
ticker,
name:$('cName').value.trim(),
market:$('cMarket').value.trim(),
sector:$('cSector').value.trim(),
favorite:$('cFav').value === 'true',
notes:$('cNotes').value.trim()
};

const existing = state.companies.findIndex(c => c.ticker === ticker);

if(existing >= 0){
state.companies[existing] = company;
}else{
state.companies.push(company);
}

saveLocal();
render();
}

function toggleFav(ticker){

const c = state.companies.find(x => x.ticker === ticker);

if(c){
c.favorite = !c.favorite;
}

saveLocal();
render();
}

function render(){

const box = $('companyList');

box.innerHTML = '';

state.companies.forEach(c => {

const div = document.createElement('div');

div.className = 'companyItem';

div.innerHTML = `
<button class="starbtn ${c.favorite ? 'on' : ''}" onclick="toggleFav('${c.ticker}')">
⭐
</button>

<div>
<div style="font-weight:900">${c.ticker}</div>
<div style="font-size:12px;color:#aaa">${c.name}</div>
</div>

<div>${c.market}</div>
`;

box.appendChild(div);

});
}

loadLocal();

if(!state.companies.length){
seed();
}

render();

</script>
